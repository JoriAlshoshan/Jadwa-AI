{% load static %}
{% load i18n %}

<footer class="footer-pro">
  <div class="container footer-pro-inner">

    <!-- Column 1 -->
    <div class="footer-col">
      <div class="footer-brand">
        <img src="{% static 'img/jadwa-logo.png' %}" alt="Jadwa AI">
      </div>
      <p class="footer-desc">
        {% trans "Jadwa AI helps entrepreneurs evaluate business ideas using AI-powered feasibility insights." %}
      </p>
    </div>

    <!-- Column 4 (Minimal Contact) -->
    <div class="footer-col">
      <a href="mailto:contact@jadwa-ai.com" class="footer-meta footer-link">
        contact@jadwa-ai.com
      </a>
      <div class="footer-meta">{% trans "Saudi Arabia" %}</div>
    </div>

  </div>

  <!-- Bottom -->
  <div class="container footer-bottom">
    <span>© 2026 Jadwa AI. {% trans "All rights reserved." %}</span>
  </div>
</footer>
